<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-glow: linear-gradient(135deg, #a855f7, #ec4899, #ff7b00);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Dynamic Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Reusable Luxury Card Design */
        .auth-container, .celebration-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 35px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Initial State Hidden for Content Card */
        .celebration-card {
            position: absolute;
            display: none;
            opacity: 0;
            transform: scale(0.95);
        }

        .icon-accent {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message-content {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        /* Input Form Architecture */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .private-code-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.2em;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .private-code-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.25);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 8px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* Premium Buttons */
        .action-button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s ease;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.08);
            outline: none;
            width: 100%;
        }

        .action-button:hover {
            transform: scale(1.02) translateY(-1px);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.15);
        }

        .action-button:active {
            transform: scale(0.98) translateY(0);
        }

        .celebrate-btn {
            width: auto;
            background: #ffffff;
        }

        /* Interactivity Classes */
        .confetti {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .shake-animation {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>

    <canvas id="ambient-glow"></canvas>
