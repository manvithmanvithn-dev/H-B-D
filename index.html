<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, My Friend!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Floating Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Glassmorphism Birthday Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            z-index: 10;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-wrapper {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ff7b00, #ff007b, #9d00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Interactive Action Button */
        .celebrate-btn {
            background: linear-gradient(45deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }

        .celebrate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .celebrate-btn:active {
            transform: scale(0.98);
        }

        /* Dynamic Celebration Pop Particles */
        .burst-particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 5;
            animation: burst Out 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes burstOut {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(var(--mx), var(--my)) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div id="particle-container"></div>

    <!-- Main Message Card -->
    <div class="card">
        <div class="icon-wrapper">🎉</div>
        <h1>Happy Birthday, Friend!</h1>
        <p>
            To an incredible friend who brings so much joy, laughter, and light into my life—may your special day be filled with endless happiness, great memories, and everything you've been wishing for! Cheers to another wonderful year ahead!
        </p>
        <button class="celebrate-btn" onclick="triggerCelebration(event)">Press to Celebrate ✨</button>
    </div>

    <script>
        // Create random background ambient particles
        const container = document.getElementById('particle-container');
        const colors = ['#ff7b00', '#ff007b', '#9d00ff', '#00f5ff', '#ffeb3b'];

        function createAmbientParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 8 + 4;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.left = `${Math.random() * 100}vw`;
                particle.style.animationDelay = `${Math.random() * 6}s`;
                particle.style.animationDuration = `${Math.random() * 4 + 4}s`;
                
                container.appendChild(particle);
            }
        }
        createAmbientParticles();

        // Click interaction explosion effect
        function triggerCelebration(event) {
            const btn = event.target;
            const rect = btn.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('burst-particle');
                
                const size = Math.random() * 10 + 6;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // Absolute positioning based on coordinates
                p.style.left = `${startX}px`;
                p.style.top = `${startY}px`;
                
                // Random vector trajectories for dynamic spray
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;
                
                p.style.setProperty('--mx', `${moveX}px`);
                p.style.setProperty('--my', `${moveY}px`);
                
                document.body.appendChild(p);
                
                // Cleanup node elements after animation finishes
                setTimeout(() => p.remove(), 800);
            }
        }
    </script>
</body>
</html>
