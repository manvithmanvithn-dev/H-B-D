<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <style>
        :root {
            --bg-primary: #0a0a0c;
            --card-bg: rgba(18, 18, 24, 0.65);
            --accent-glow: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas background for performance-optimized particle network */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Premium Glassmorphism Container */
        .showcase-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            animation: prepareLayout 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes prepareLayout {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .visual-anchor {
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message-body {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.7;
            font-weight: 400;
            margin-bottom: 36px;
        }

        /* Interactive Premium Button Architecture */
        .cta-trigger {
            position: relative;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 36px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .cta-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
        }

        .cta-trigger:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <canvas id="ambient-network"></canvas>

    <div class="showcase-container">
        <div class="visual-anchor">✨</div>
        <h1>Happy Birthday</h1>
        <p class="message-body">
            Wishing you a remarkable day defined by excellence, happiness, and continued accomplishment. May the upcoming year bring new avenues of growth, fulfillment, and outstanding milestones.
        </p>
        <button class="cta-trigger" onclick="initializeCelebration()">Initialize Celebration</button>
    </div>

    <script>
        // High-performance Canvas Particle Subsystem
        const canvas = document.getElementById('ambient-network');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.radius = Math.random() * 1.5 + 0.5;
                this.speedV = Math.random() * 0.5 + 0.2;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speedV;
                if (this.y < -10) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(168, 85, 247, ${this.alpha})`;
                ctx.fill();
            }
        }

        function setupParticles() {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        setupParticles();
        animate();

        // Refined Celebration Interactive Micro-Burst
        function initializeCelebration() {
            const container = document.querySelector('.showcase-container');
            const rect = container.getBoundingClientRect();
            
            for (let i = 0; i < 50; i++) {
                const element = document.createElement('div');
                element.style.position = 'absolute';
                element.style.width = `${Math.random() * 8 + 4}px`;
                element.style.height = element.style.width;
                
                const palette = ['#6366f1', '#a855f7', '#ec4899', '#ffffff'];
                element.style.backgroundColor = palette[Math.floor(Math.random() * palette.length)];
                element.style.borderRadius = '50%';
                element.style.pointerEvents = 'none';
                element.style.zIndex = '100';

                const sourceX = window.innerWidth / 2;
                const sourceY = rect.bottom - 40;
                element.style.left = `${sourceX}px`;
                element.style.top = `${sourceY}px`;

                document.body.appendChild(element);

                const vectorAngle = Math.random() * Math.PI * 2;
                const magnitude = Math.random() * 180 + 60;
                const destinationX = Math.cos(vectorAngle) * magnitude;
                const destinationY = Math.sin(vectorAngle) * magnitude;

                const animation = element.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${destinationX}px), calc(-50% + ${destinationY}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 600 + 600,
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)'
                });

                animation.onfinish = () => element.remove();
            }
        }
    </script>
</body>
</html>
